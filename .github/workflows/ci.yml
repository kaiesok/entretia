name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Installer les dependances
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build:web

  api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restaurer
        run: dotnet restore apps/api/Entretia.sln

      - name: Build (avertissements = erreurs)
        run: dotnet build apps/api/Entretia.sln --no-restore --configuration Release

      - name: Tests
        run: dotnet test apps/api/Entretia.sln --no-build --configuration Release
