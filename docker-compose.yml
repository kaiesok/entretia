# Environnement local : `docker compose up -d`
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: entretia
      POSTGRES_PASSWORD: entretia_dev
      POSTGRES_DB: entretia
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U entretia"]
      interval: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: entretia
      MINIO_ROOT_PASSWORD: entretia_dev
    ports:
      - "9000:9000"   # API S3
      - "9001:9001"   # Console web
    volumes:
      - minio-data:/data

volumes:
  postgres-data:
  minio-data:
